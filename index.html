<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mother Meera – Official Social Media Links"
    />
    <title>Mother Meera</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Font Awesome for social icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Background decorative elements -->
      <div class="bg-circle bg-circle--top"></div>
      <div class="bg-circle bg-circle--bottom"></div>
      <main class="card">
        <!-- Profile section -->
        <header class="profile">
          <div class="avatar-ring">
            <img
              class="avatar"
              id="profile-avatar"
              alt="Mother Meera"
              onerror="
                this.style.display = 'none';
                this.parentElement.querySelector(
                  '.avatar-fallback',
                ).style.display = 'flex';
              "
            />
            <div class="avatar-fallback" aria-hidden="true">
              <i class="fa-solid fa-om"></i>
            </div>
          </div>
          <h1 class="profile__name" id="profile-name">Mother Meera</h1>
          <p class="profile__tagline" id="profile-tagline">
            Divine Mother &nbsp;·&nbsp; Spiritual Teacher
          </p>
        </header>

        <!-- Links section -->
        <nav aria-label="Social media links">
          <ul class="link-list" id="link-list">
            <!-- Links will be injected here by JavaScript -->
          </ul>
        </nav>

        <footer class="card__footer">
          <p>
            &copy; <span id="year"></span>
            <span id="copyright-name">Mother Meera</span>. All rights reserved.
          </p>
        </footer>
      </main>
    </div>

    <script type="module">
      import { LINKS, PROFILE, SITE } from "./constants.js";

      // Set profile information
      document.getElementById("profile-avatar").src = PROFILE.avatarUrl;
      document.getElementById("profile-avatar").alt = PROFILE.avatarAlt;
      document.getElementById("profile-name").textContent = PROFILE.name;
      document.getElementById("profile-tagline").innerHTML =
        PROFILE.tagline.replace(/·/g, "&nbsp;·&nbsp;");
      document.getElementById("copyright-name").textContent =
        SITE.copyrightName;

      // Set page title and meta description
      document.title = SITE.title;
      document
        .querySelector('meta[name="description"]')
        .setAttribute("content", SITE.description);

      // Render links
      const linkList = document.getElementById("link-list");
      LINKS.forEach((link) => {
        const listItem = document.createElement("li");
        const anchor = document.createElement("a");

        anchor.className = `link-btn link-btn--${link.brand}`;
        anchor.href = link.url;
        anchor.target = "_blank";
        anchor.rel = "noopener noreferrer";

        anchor.innerHTML = `
          <span class="link-btn__icon"><i class="fa-solid ${link.icon}"></i></span>
          <span class="link-btn__label">${link.label}</span>
          <span class="link-btn__arrow"><i class="fa-solid fa-chevron-right"></i></span>
        `;

        listItem.appendChild(anchor);
        linkList.appendChild(listItem);
      });

      // Set current year
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
