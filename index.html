<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mother Meera – Official Social Media Links"
    />
    <title>Mother Meera</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Font Awesome for social icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Background decorative elements -->
      <div class="bg-circle bg-circle--top"></div>
      <div class="bg-circle bg-circle--bottom"></div>
      <main class="card">
        <!-- Profile section -->
        <header class="profile">
          <div class="avatar-ring">
            <img
              class="avatar"
              src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Mother_Meera.jpg/320px-Mother_Meera.jpg"
              alt="Mother Meera"
              onerror="
                this.style.display = 'none';
                this.parentElement.querySelector(
                  '.avatar-fallback',
                ).style.display = 'flex';
              "
            />
            <div class="avatar-fallback" aria-hidden="true">
              <i class="fa-solid fa-om"></i>
            </div>
          </div>
          <h1 class="profile__name">Mother Meera</h1>
          <p class="profile__tagline">
            Divine Mother &nbsp;·&nbsp; Spiritual Teacher
          </p>
        </header>

        <!-- Links section -->
        <nav aria-label="Social media links">
          <ul class="link-list">
            <li>
              <a
                class="link-btn link-btn--website"
                href="https://www.mothermeera.com"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="link-btn__icon"
                  ><i class="fa-solid fa-globe"></i
                ></span>
                <span class="link-btn__label">Official Website</span>
                <span class="link-btn__arrow"
                  ><i class="fa-solid fa-chevron-right"></i
                ></span>
              </a>
            </li>
            <li>
              <a
                class="link-btn link-btn--youtube"
                href="https://www.youtube.com/@MotherMeeraOfficial"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="link-btn__icon"
                  ><i class="fa-brands fa-youtube"></i
                ></span>
                <span class="link-btn__label">YouTube</span>
                <span class="link-btn__arrow"
                  ><i class="fa-solid fa-chevron-right"></i
                ></span>
              </a>
            </li>
            <li>
              <a
                class="link-btn link-btn--facebook"
                href="https://www.facebook.com/mothermeera"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="link-btn__icon"
                  ><i class="fa-brands fa-facebook-f"></i
                ></span>
                <span class="link-btn__label">Facebook</span>
                <span class="link-btn__arrow"
                  ><i class="fa-solid fa-chevron-right"></i
                ></span>
              </a>
            </li>
            <li>
              <a
                class="link-btn link-btn--instagram"
                href="https://www.instagram.com/mothermeeraofficial"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="link-btn__icon"
                  ><i class="fa-brands fa-instagram"></i
                ></span>
                <span class="link-btn__label">Instagram</span>
                <span class="link-btn__arrow"
                  ><i class="fa-solid fa-chevron-right"></i
                ></span>
              </a>
            </li>
            <li>
              <a
                class="link-btn link-btn--twitter"
                href="https://x.com/MotherMeeraOrg"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="link-btn__icon"
                  ><i class="fa-brands fa-x-twitter"></i
                ></span>
                <span class="link-btn__label">X&thinsp;/&thinsp;Twitter</span>
                <span class="link-btn__arrow"
                  ><i class="fa-solid fa-chevron-right"></i
                ></span>
              </a>
            </li>
            <li>
              <a
                class="link-btn link-btn--spotify"
                href="https://open.spotify.com/artist/6YpQu19Ar6T8m1VHkxT5oo"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="link-btn__icon"
                  ><i class="fa-brands fa-spotify"></i
                ></span>
                <span class="link-btn__label">Spotify – Sacred Music</span>
                <span class="link-btn__arrow"
                  ><i class="fa-solid fa-chevron-right"></i
                ></span>
              </a>
            </li>
          </ul>
        </nav>

        <footer class="card__footer">
          <p>
            &copy; <span id="year"></span> Mother Meera. All rights reserved.
          </p>
        </footer>
      </main>
    </div>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
