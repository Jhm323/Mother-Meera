<!doctype html>
<html lang="en" class="no-js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mother Meera is a Spiritual Teacher and Mystic. She is seen as an Avatar of the Divine Mother. Her work is to bring down the Paramatman Light and reduce suffering for all beings."
    />
    <meta
      name="keywords"
      content="Mother Meera, Spiritual, Guidance, Paramatman Light"
    />
    <meta property="og:title" content="Mother Meera" />
    <meta
      property="og:image"
      content="https://imgs.search.brave.com/cbRuZ-iNsAM8DQBuh6SToeb96svLzjB50dZ0eUF7j3g/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly93d3cu/bW90aGVybWVlcmEu/Y29tL0JXLTA2Lmpw/Zw"
    />
    <title>Mother Meera</title>
    <link rel="stylesheet" href="styles.css" />

    <!-- Fonts -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <!-- Plausible script link analytics -->
    <script
      defer
      data-domain="yourdomain.com"
      src="https://plausible.io/js/script.js"
    ></script>
  </head>

  <body>
    <div class="page-wrapper">
      <!-- Background decorative elements -->
      <div class="bg-circle bg-circle--top"></div>
      <div class="bg-circle bg-circle--bottom"></div>
      <main class="card">
        <!-- Profile section -->
        <header class="profile">
          <div class="avatar-ring">
            <img class="avatar" id="profile-avatar" alt="Mother Meera" />
            <div class="avatar-fallback" aria-hidden="true">
              <i class="fa-solid fa-om"></i>
            </div>
          </div>
          <h1 class="profile__name" id="profile-name">Mother Meera</h1>
          <p class="profile__tagline" id="profile-tagline">
            Divine Mother &nbsp;·&nbsp; Spiritual Teacher
          </p>
        </header>

        <!-- Links section -->
        <nav aria-label="Social media links">
          <ul class="link-list" id="link-list">
            <li>
              <a href="https://mothermeera.com">Official Website</a>
            </li>

            <li>
              <a href="https://youtube.com/@mothermeera">YouTube</a>
            </li>

            <li>
              <a href="https://facebook.com/mothermeera">Facebook</a>
            </li>

            <li>
              <a href="https://instagram.com/mothermeera">Instagram</a>
            </li>
          </ul>
        </nav>

        <footer class="card__footer">
          <p>
            &copy; <span id="year"></span>
            <span id="copyright-name">Mother Meera</span>. All rights reserved.
          </p>
        </footer>
      </main>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
